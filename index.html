<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTICHNOST.NET</title>
    <style>
        /* Базовые настройки стиля (черный фон и оранжевый текст) */
        body {
            background-color: #000000;
            color: #ff5500; /* Тот самый яркий цифровой оранжевый */
            font-family: 'Courier New', Courier, monospace; /* Моноширинный шрифт для нет-арт стиля */
            margin: 0;
            padding: 60px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* Главная сетка, разделяющая экран на две колонки (как на твоем макете) */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- ЛЕВАЯ СТОРОНА --- */
        .left-side {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Огромный массивный заголовок */
        .main-title {
            font-family: 'Impact', 'Arial Narrow Bold', sans-serif;
            font-size: 4.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 0.9;
            margin-bottom: 50px;
            color: #ff5500;
        }

        /* Ссылка-обертка: объединяет обложку и подпись в один кликабельный блок */
        .book-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Эффект при наведении курсора */
        .book-link:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Оранжевый квадрат-заглушка для обложки */
        .cover-placeholder {
            width: 220px;
            height: 310px;
            background-color: #ff5500;
            margin-bottom: 20px;
        }

        /* Белый текст версии под обложкой */
        .book-version {
            color: #ffffff;
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* --- ПРАВАЯ СТОРОНА --- */
        .right-side {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            text-align: right; /* Текст прижат к правому краю */
        }

        /* Блок манифеста / описания */
        .description-text {
            font-size: 1.4rem;
            line-height: 1.4;
            max-width: 420px;
            margin-top: 15px;
            word-wrap: break-word;
        }

        /* Иллюстрация в правом нижнем углу */
        .art-image {
            width: 340px;
            height: 240px;
            object-fit: cover;
            margin-top: 40px;
            /* Временный эффект, делающий картинку-заглушку черно-оранжевой */
            filter: grayscale(1) sepia(1) hue-rotate(340deg) saturate(6) contrast(1.2);
        }

        /* Адаптация под мобильные телефоны (чтобы всё не ломалось на узком экране) */
        @media (max-width: 768px) {
            body { padding: 30px 20px; }
            .main-container { grid-template-columns: 1fr; gap: 60px; }
            .right-side { align-items: flex-start; text-align: left; }
            .main-title { font-size: 3rem; margin-bottom: 30px; }
            .art-image { width: 100%; max-width: 340px; }
        }
    </style>
</head>
