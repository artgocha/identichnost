<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTICHNOST.NET</title>
    <style>
        body {
            background-color: #000000;
            color: #ff5500; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            padding: 60px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .main-title {
            font-family: 'Impact', 'Arial Narrow Bold', sans-serif;
            font-size: 4.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 0.9;
            margin-bottom: 50px;
            color: #ff5500;
        }

        .book-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .book-link:hover {
            transform: scale(1.03);
        }

        /* Оранжевый квадрат-заглушка */
        .cover-placeholder {
            width: 220px;
            height: 310px;
            background-color: #ff5500;
            margin-bottom: 20px;
            display: block;
        }

        .book-version {
            color: #ffffff;
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .right-side {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            text-align: right; 
        }

        .description-text {
            font-size: 1.4rem;
            line-height: 1.4;
            max-width: 420px;
            margin-top: 15px;
        }

        /* Заглушка для правого арта (теперь это стильный цифровой шум из линий, а не картинка) */
        .art-placeholder {
            width: 340px;
            height: 240px;
            border: 2px solid #ff5500;
            background: repeating-linear-gradient(45deg, #000, #000 8px, #ff5500 8px, #ff5500 10px);
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            body { padding: 30px 20px; }
            .main-container { grid-template-columns: 1fr; gap: 60px; }
            .right-side { align-items: flex-start; text-align: left; }
            .main-title { font-size: 3rem; margin-bottom: 30px; }
            .art-placeholder { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="left-side">
            <div class="main-title">IDENTICHNOST.NET</div>
            
            <a href="sbornik-1.html" class="book-link">
                <div class="cover-placeholder"></div>
                <p class="book-version">identichnost.net[V1]</p>
            </a>
        </div>

        <div class="right-side">
            <div class="description-text">
                etot proekt issledovanie sobstvennoy identichnosti, razbrosannoy i razbitoy na sborniki v internete.
            </div>
            
            <div class="art-placeholder"></div>
        </div>

    </div>

</body>
</html>
