<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои стихи и сборники</title>
    <style>
        /* Стиль для красивого книжного фона и шрифтов */
        body {
            font-family: 'Georgia', serif;
            background-color: #fdfcf7; /* Мягкий бумажный цвет */
            color: #2c3e50;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 50px;
        }
        /* Сетка для обложек */
        .books-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        /* Карточка книги */
        .book-card {
            width: 220px;
            text-decoration: none; /* Убираем подчеркивание ссылки */
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Эффект при наведении мышки на обложку */
        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .book-cover {
            width: 100%;
            height: 330px;
            object-fit: cover;
            border-radius: 4px 12px 12px 4px; /* Делаем закругление как у корешка книги */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }
        .book-title {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Моя поэтическая мифология</h1>
    <p class="subtitle">Добро пожаловать в мою идентичность.</p>

    <div class="books-grid">
        
        <!-- ПЕРВЫЙ СБОРНИК -->
        <!-- Ссылка ведет на файл sbornik-1.html -->
        <a href="sbornik-1.html" class="book-card">
            <!-- Пока обложки нет, тут стоит временная картинка-заглушка -->
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400" alt="Обложка 1" class="book-cover">
            <div class="book-title">«identichnost.net(2026-???)»</div>
        </a>

        <!-- ВТОРОЙ СБОРНИК -->
        <a href="sbornik-2.html" class="book-card">
            <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400" alt="Обложка 2" class="book-cover">
            <div class="book-title">«Цитадель(2021-2023)»</div>
        </a>

    </div>

</body>
</html>
